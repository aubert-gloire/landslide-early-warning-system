services:
  - type: web
    name: landslide-ews-api
    env: python
    region: oregon
    plan: starter
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB_NAME
        value: landslide_ews
      - key: TELERIVET_API_KEY
        sync: false
      - key: TELERIVET_PROJECT_ID
        sync: false
      - key: TELERIVET_ROUTE_ID
        sync: false
      - key: OPENTOPO_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: OFFICER_PASSWORD
        sync: false
      - key: APP_ENV
        value: production
      - key: EARTHDATA_TOKEN
        sync: false
      - key: EARTHDATA_USERNAME
        sync: false
      - key: EARTHDATA_PASSWORD
        sync: false
