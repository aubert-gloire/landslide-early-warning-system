name: Daily Landslide Pipeline

on:
  schedule:
    # 08:00 UTC = 10:00 Africa/Kigali (CHIRPS data published by ~07:00 UTC)
    - cron: "0 8 * * *"
  workflow_dispatch:  # allow manual trigger from GitHub UI

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger prediction pipeline
        run: |
          curl -X POST "${{ secrets.API_BASE_URL }}/api/trigger" \
            -H "Content-Type: application/json" \
            -d '{"dry_run": false}' \
            --max-time 180 \
            -w "\nHTTP %{http_code}" \
            -o /tmp/response.txt || true
          cat /tmp/response.txt || echo "(no response body)"
