name: Daily Landslide Pipeline

on:
  schedule:
    # 04:00 UTC = 06:00 Africa/Kigali
    - cron: "0 4 * * *"
  workflow_dispatch:  # allow manual trigger from GitHub UI

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger prediction pipeline
        run: |
          curl -X POST "${{ secrets.API_BASE_URL }}/api/trigger" \
            -H "Content-Type: application/json" \
            -d '{"dry_run": false}' \
            --fail \
            --max-time 120

      - name: Notify on failure
        if: failure()
        run: echo "Daily pipeline trigger failed — check Render logs"
